<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Bags - AI Token Studio</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills try to overwrite window.fetch in sandboxed environments
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: false, // Make it non-configurable to prevent further attempts
              enumerable: true,
              get: () => originalFetch,
              set: (v) => { 
                console.warn('Prevented attempt to overwrite window.fetch with:', v);
              }
            });
          } catch (e) {
            // If it's already non-configurable, we can't do much but we've already tried
            console.warn('window.fetch is already protected or non-configurable');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
